name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repository health check
        run: python3 scripts/repo_health.py

      - name: No-network guardrail
        run: python3 scripts/no_network_scan.py

      - name: Bad implementation string guardrail
        run: |
          set -euo pipefail
          BAD_MATCHES=$(rg -n -i \
            -e '\bTODO\b' \
            -e '\bFIXME\b' \
            -e '\bplaceholder\b' \
            -e '\bmock\b' \
            GradeDraft GradeDraftTests || true)
          if [ -n "$BAD_MATCHES" ]; then
            echo "$BAD_MATCHES"
            echo "Bad implementation strings found in GradeDraft source/tests."
            exit 1
          fi

  xcode-build-and-test:
    runs-on: macos-latest
    needs: static-validation
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Log Xcode and available targets
        run: |
          xcodebuild -version
          xcodebuild -list -project GradeDraft.xcodeproj
          xcrun simctl list devices available

      - name: Select scheme and iPhone simulator
        id: xcode-target
        run: |
          set -euo pipefail
          PROJECT=GradeDraft.xcodeproj
          SCHEME_OUTPUT="$(xcodebuild -list -json -project "$PROJECT")"
          SCHEME="$(echo "$SCHEME_OUTPUT" | /usr/bin/python3 -c 'import json,sys; data=json.load(sys.stdin); schemes=data.get("project",{}).get("schemes",[]); print(next((name for name in schemes if name=="GradeDraft"), schemes[0] if schemes else ""))')"
          if [ -z "$SCHEME" ]; then
            echo "Could not detect a scheme from xcodebuild -list output."
            echo "$SCHEME_OUTPUT"
            exit 1
          fi
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

          UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/{print $2; exit}')
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')
          fi
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found on this runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "destination=platform=iOS Simulator,id=$UDID,arch=arm64" >> "$GITHUB_OUTPUT"
          DEVICE_NAME=$(xcrun simctl list devices available | awk -F '[()]' -v UDID="$UDID" '$2 == UDID {gsub(/^[[:space:]]+/, "", $1); print $1; exit}')
          echo "destination_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project GradeDraft.xcodeproj \
            -scheme "${{ steps.xcode-target.outputs.scheme }}"

      - name: Build and test with Xcode
        id: xcode-test
        continue-on-error: true
        run: |
          set -euo pipefail
          DERIVED_DATA="${{ runner.temp }}/GradeDraftDerivedData"
          mkdir -p xcode-logs
          set +e
          xcodebuild \
            -project GradeDraft.xcodeproj \
            -scheme "${{ steps.xcode-target.outputs.scheme }}" \
            -destination "${{ steps.xcode-target.outputs.destination }}" \
            ARCHS=arm64 \
            -derivedDataPath "$DERIVED_DATA" \
            clean test \
            -resultBundlePath "$DERIVED_DATA/TestResults.xcresult" \
            | tee xcode-logs/xcodebuild.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "test_exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Capture live app screenshot on simulator
        if: always()
        env:
          DERIVED_DATA: ${{ runner.temp }}/GradeDraftDerivedData
          DESTINATION: ${{ steps.xcode-target.outputs.destination }}
        run: |
          set -euo pipefail

          UDID="${DESTINATION##*id=}"
          UDID="${UDID%%,*}"
          if [ -z "$UDID" ]; then
            echo "No simulator UDID found in destination: $DESTINATION"
            exit 0
          fi

          APP_PATH="$(find "$DERIVED_DATA" -path '*/Build/Products/*/*.app' -type d | head -n 1 || true)"
          if [ -z "$APP_PATH" ]; then
            echo "No built .app found under $DERIVED_DATA; skipping screenshot."
            exit 0
          fi

          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || true)"
          if [ -z "$BUNDLE_ID" ]; then
            echo "Unable to read CFBundleIdentifier from $APP_PATH/Info.plist; skipping screenshot."
            exit 0
          fi

          mkdir -p screenshots
          xcrun simctl boot "$UDID" || true
          xcrun simctl install "$UDID" "$APP_PATH" || true
          if ! xcrun simctl launch "$UDID" "$BUNDLE_ID"; then
            echo "Could not launch $BUNDLE_ID on simulator $UDID; skipping screenshot."
            exit 0
          fi
          sleep 2
          xcrun simctl io "$UDID" screenshot "screenshots/live-app-${UDID}-$(date +%Y%m%d-%H%M%S).png"

      - name: Upload iOS screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          retention-days: 5
          path: screenshots

      - name: Upload test result bundle and logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xcodebuild-output
          retention-days: 5
          path: |
            ${{ runner.temp }}/GradeDraftDerivedData/TestResults.xcresult
            xcode-logs/xcodebuild.log

      - name: Fail if Xcode tests failed
        if: always()
        run: |
          if [ "${{ steps.xcode-test.outputs.test_exit_code }}" != "0" ]; then
            exit 1
          fi

      - name: Write CI job summary
        if: success()
        run: |
          {
            echo "## iOS CI Results"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Xcode | $(xcodebuild -version | head -1) |"
            echo "| Scheme | ${{ steps.xcode-target.outputs.scheme }} |"
            echo "| Destination | ${{ steps.xcode-target.outputs.destination_name }} (${{ steps.xcode-target.outputs.destination }}) |"
            echo "| Result Bundle | ${{ runner.temp }}/GradeDraftDerivedData/TestResults.xcresult |"
            echo "| Screenshot | screenshots/live-app-*.png |"
          } >> "$GITHUB_STEP_SUMMARY"
