name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Repository health check
        run: python3 scripts/repo_health.py

      - name: No-network guardrail
        run: python3 scripts/no_network_scan.py

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install SwiftLint and xcbeautify
        run: |
          brew install swiftlint xcbeautify

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies -project GradeDraft.xcodeproj -scheme GradeDraft

      - name: Lint (inline annotations)
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

      - name: Select simulator
        run: |
          UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          DEVICE=$(xcrun simctl list devices available | awk '/iPhone/ { print $0; exit }')
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "SIMULATOR_DESTINATION=id=$UDID" >> "$GITHUB_ENV"
          echo "Selected simulator: $DEVICE (UDID: $UDID)"

      - name: Build and test
        run: |
          set -euo pipefail
          mkdir -p test-reports
          xcodebuild test \
            -project GradeDraft.xcodeproj \
            -scheme GradeDraft \
            -destination "$SIMULATOR_DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            2>&1 | xcbeautify --report junit --report-path test-reports/

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "test-reports/junit.xml"
          check_name: "Unit Tests"
          fail_on_failure: true
          detailed_summary: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract coverage report
        if: always()
        run: |
          mkdir -p coverage-report
          xcrun xccov view --report TestResults.xcresult \
            | tee coverage-report/summary.txt || true
          xcrun xccov view --report --json TestResults.xcresult \
            > coverage-report/coverage.json 2>/dev/null || true
          # Per-file breakdown
          xcrun xccov view --files-for-target GradeDraft.app TestResults.xcresult \
            | sort -t '%' -k1 -n \
            > coverage-report/by-file.txt 2>/dev/null || true

      - name: Capture simulator screenshots
        if: always()
        run: |
          mkdir -p Screenshots
          UDID="${{ env.SIMULATOR_UDID }}"

          # Ensure the simulator is booted (it may already be from the test run)
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b 2>/dev/null || sleep 6

          # Find the freshly-built .app in DerivedData
          APP=$(find ~/Library/Developer/Xcode/DerivedData -maxdepth 7 \
            -name "GradeDraft.app" -type d \
            ! -path "*/Index.noindex/*" \
            ! -path "*/SourcePackages/*" \
            | xargs ls -dt 2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            echo "::warning::GradeDraft.app not found in DerivedData — skipping screenshots"
            exit 0
          fi

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP/Info.plist")
          echo "Launching $BUNDLE_ID from $APP"

          xcrun simctl install "$UDID" "$APP"
          xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID"
          sleep 4
          xcrun simctl io "$UDID" screenshot "Screenshots/01-launch.png"
          echo "Captured launch screenshot"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## iOS CI Results"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            XCODE_VER=$(xcodebuild -version | head -1)
            echo "| Xcode | $XCODE_VER |"
            SIM=$(xcrun simctl list devices available | awk '/iPhone/ { print $0; exit }' | sed 's/^ *//')
            echo "| Simulator | $SIM |"
            echo ""
            if [ -f coverage-report/summary.txt ]; then
              echo "### Code Coverage"
              echo '```'
              head -50 coverage-report/summary.txt
              echo '```'
            fi
            echo ""
            if [ -f coverage-report/by-file.txt ] && [ -s coverage-report/by-file.txt ]; then
              echo "### Coverage by Source File"
              echo '```'
              head -50 coverage-report/by-file.txt
              echo '```'
            fi
            echo ""
            SHOT_COUNT=$(ls Screenshots/*.png 2>/dev/null | wc -l | tr -d ' ')
            if [ "$SHOT_COUNT" -gt 0 ]; then
              echo "### Simulator Screenshots"
              echo "$SHOT_COUNT screenshot(s) captured. Download from the **simulator-screenshots** artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

      - name: Upload simulator screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulator-screenshots
          path: Screenshots/
          if-no-files-found: warn
