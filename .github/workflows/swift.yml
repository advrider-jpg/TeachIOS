name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Repository health check
        run: python3 scripts/repo_health.py

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and test GradeDraft
        run: |
          set -euo pipefail
          DESTINATION="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print "id=" $2; exit }')"
          if [ -z "$DESTINATION" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          xcodebuild test \
            -project GradeDraft.xcodeproj \
            -scheme GradeDraft \
            -destination "$DESTINATION"
